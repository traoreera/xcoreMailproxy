name: xmailproxy
version: "1.0.0"
entry_class: main:MailProxyService
description: >
  Extension XCore proxy Redis → email pour le marketplace.
  Souscrit au channel Redis "marketplace.email" et dispatche les events
  vers ext.email (xmailler). Permet au worker Celery d'envoyer des emails
  sans accès direct aux services XCore.
homepage: https://github.com/traoreera/xcore
repository: https://github.com/traoreera/xcore
